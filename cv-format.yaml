# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.8/schema.json
# Shared design/locale/settings for cv.yaml and every applications/*/cv.yaml.
# Passed to rendercv via -d/-lc/-s flags so tailored CVs only need to carry `cv:`.
design:
  theme: engineeringresumes
  page:
    size: a4
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: false
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(70, 70, 70)
    connections: rgb(70, 70, 70)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Calibri
      name: Calibri
      headline: Calibri
      connections: Calibri
      section_titles: Calibri
    font_size:
      body: 11pt
      name: 22pt
      headline: 12pt
      connections: 11pt
      section_titles: 14pt
    bold:
      name: true
      headline: false
      section_titles: true
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    space_below_name: 0.25cm
    space_below_headline: 0.45cm
    space_below_connections: 0.3cm
    connections:
      phone_number_format: E164
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.2cm
  section_titles:
    type: with_full_line
    space_above: 0.6cm
    space_below: 0.3cm
  sections:
    space_between_regular_entries: 0.4cm
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 6cm
    highlights:
      bullet: "•"
      nested_bullet: "◦"
      space_left: 0.2cm
      space_above: 0.08cm
      space_between_items: 0.14cm
      space_between_bullet_and_text: 0.2em
  templates:
    one_line_entry:
      main_column: |-
        **LABEL:**

        DETAILS
    education_entry:
      main_column: |-
        **DEGREE** - *INSTITUTION*
        SUMMARY
        HIGHLIGHTS
      degree_column: null
      date_and_location_column: |-
        DATE
        LOCATION
    normal_entry:
      main_column: |-
        **NAME** - SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **POSITION** - *COMPANY*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION - DATE

locale:
  language: english
settings:
  current_date: today
  render_command:
    output_folder: rendercv_output
  bold_keywords: []
  pdf_title: Yusef Nsar - CV
